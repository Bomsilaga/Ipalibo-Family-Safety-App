<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="The Ipalibos — Your Family. Organised. Safe. Connected.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="The Ipalibos">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>The Ipalibos</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Google Maps JS API for the Live Location map tile (docs/06-deviations.md
    "GPS: reverse geocoding added; full map tile still blocked on a Google
    Maps API key" — key now provided). This key is meant to be
    client-embedded: Google secures it via HTTP-referrer restriction in
    Cloud Console, not secrecy. Restrict it to this app's domains
    (ipalibos.vercel.app, ipalibo-family-safety-app.vercel.app) there.
  -->
  <script defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCVIrqz2CResntrolbXTUXl7c9jj8BJb-8"></script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
