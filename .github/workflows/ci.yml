name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Installed from source rather than via a marketplace action so the
      # workflow uses only GitHub-owned actions (repo Actions policies that
      # restrict third-party actions otherwise kill the run at startup).
      - name: Install Flutter (stable)
        run: |
          git clone --depth 1 -b stable https://github.com/flutter/flutter.git "$RUNNER_TEMP/flutter"
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      # Info-level lints are allowed (tracked in-repo); warnings and
      # errors fail the build.
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test
