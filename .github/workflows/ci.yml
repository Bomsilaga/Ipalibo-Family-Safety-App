name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Info-level lints are allowed (tracked in-repo); warnings and
      # errors fail the build.
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test
